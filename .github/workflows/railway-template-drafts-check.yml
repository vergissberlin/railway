name: Railway Template Drafts Check

on:
  push:
    branches:
      - main
    paths:
      - "scripts/verify-railway-template-drafts.mjs"
      - "scripts/railway-template-targets.mjs"
      - "railwayapp-**/railway-template.json"
      - ".github/workflows/railway-template-drafts-check.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: read

jobs:
  verify-drafts:
    name: Verify Railway Template Drafts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      # Public `railwayapp-*` repos: default `github.token` is enough for submodule checkout.
      # If any submodule is private again, set secret SUBMODULES_PAT (fine-grained Contents: Read or classic `repo`); otherwise clone fails with "repository not found".
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Ensure Railway token is configured
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Missing RAILWAY_TOKEN secret"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run template draft verification
        run: pnpm run templates:verify

      - name: Export JSON verification report
        run: pnpm run templates:verify:json > railway-template-drafts-report.json

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: railway-template-drafts-report
          path: railway-template-drafts-report.json
          if-no-files-found: error
