name: Railway Template Drafts Check

on:
  push:
    branches:
      - main
    paths:
      - "scripts/verify-railway-template-drafts.mjs"
      - "scripts/railway-template-targets.mjs"
      - "railwayapp-**/railway-template.json"
      - ".github/workflows/railway-template-drafts-check.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:
  schedule:
    - cron: "15 6 * * *"

permissions:
  contents: read

jobs:
  verify-drafts:
    name: Verify Railway Template Drafts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      # Private `railwayapp-*` repos require a PAT: `github.token` cannot clone other private repos (clone fails with "repository not found").
      # Create a fine-grained PAT (Contents: Read) for each `vergissberlin/railwayapp-*` repo (or classic PAT with `repo` scope), add as repo secret SUBMODULES_PAT.
      - name: Require SUBMODULES_PAT for private submodules
        if: ${{ secrets.SUBMODULES_PAT == '' }}
        run: |
          echo "::error::Missing repository secret SUBMODULES_PAT. Private submodule clones (e.g. railwayapp-mqtt) need a PAT: Settings → Secrets → Actions → add SUBMODULES_PAT (fine-grained: Contents Read on each railwayapp-* repo)."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Ensure Railway token is configured
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Missing RAILWAY_TOKEN secret"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run template draft verification
        run: pnpm run templates:verify

      - name: Export JSON verification report
        run: pnpm run templates:verify:json > railway-template-drafts-report.json

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: railway-template-drafts-report
          path: railway-template-drafts-report.json
          if-no-files-found: error
