<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Railway Templates Banner</title>
  <desc id="desc">Fancy gradient banner with profile avatar and project title.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1021"/>
      <stop offset="0.5" stop-color="#101A3A"/>
      <stop offset="1" stop-color="#1A1245"/>
    </linearGradient>
    <linearGradient id="shine" x1="180" y1="40" x2="430" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#66E3FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="180" cy="180" r="94"/>
    </clipPath>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>

  <circle cx="180" cy="180" r="112" fill="url(#shine)" opacity="0.35" filter="url(#softGlow)"/>
  <circle cx="180" cy="180" r="102" fill="none" stroke="url(#shine)" stroke-width="6"/>
  <image
    href="https://avatars.githubusercontent.com/u/179964"
    x="86"
    y="86"
    width="188"
    height="188"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#avatarClip)"
  />

  <text x="330" y="150" fill="#FFFFFF" font-family="Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="46" font-weight="800">
    vergissberlin railway templates
  </text>
  <text x="330" y="198" fill="#B6C2FF" font-family="Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="24" font-weight="500">
    Meta repository with curated Railway app submodules
  </text>

  <rect x="330" y="228" width="278" height="46" rx="23" fill="#1C285D" stroke="#5EEAD4" stroke-opacity="0.55"/>
  <text x="355" y="257" fill="#CFFAFE" font-family="Inter,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="20" font-weight="700">
    referralCode=2_sIT9
  </text>

  <circle cx="1120" cy="90" r="44" fill="#4F46E5" opacity="0.35"/>
  <circle cx="1180" cy="260" r="68" fill="#06B6D4" opacity="0.18"/>
  <circle cx="1040" cy="300" r="24" fill="#22D3EE" opacity="0.28"/>
</svg>
